name: listen
description: "A real-time split-screen translator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0-278.2.beta

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5          # Makes BLoC states/events comparable by value

  # Clean Architecture
  dartz: ^0.10.1             # Either<Failure, Success> for error handling
  get_it: ^7.6.7             # Service locator (dependency injection)
  injectable: ^2.3.2         # Code generation for get_it

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.2.1

  # Speech
  speech_to_text: ^6.6.2

  # Translation
  http: ^1.2.1

  # Utils
  uuid: ^4.4.2               # Generates unique IDs for sessions/messages

dev_dependencies:
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.4.1
  build_runner: ^2.4.9
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
